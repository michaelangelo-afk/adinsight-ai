# Supabase project config.
# This file lets `supabase db push`, `supabase link`, and `supabase functions deploy`
# work without re-entering project details.
#
# Generated by hand to match the SQL migrations in ./migrations/. Run
# `supabase init` locally to regenerate the rest of the platform scaffolding.

project_id = "dyfeolrotkjmeauiknbx"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://growthads.ng"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
inspector_port = 8083
